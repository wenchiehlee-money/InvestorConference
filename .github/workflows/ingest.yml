name: Ingest Earnings Audio

on:
  workflow_dispatch:
    inputs:
      stock_id:
        description: 'Stock ID (e.g. 2357, 2330, NVDA)'
        required: true
        default: '3231'
      year:
        description: 'Year (e.g. 2025)'
        required: true
        default: '2025'
      quarter:
        description: 'Quarter (1–4)'
        required: true
        default: '4'
      push:
        description: 'Commit & push audio after download'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      STEM: ${{ inputs.stock_id }}_${{ inputs.year }}_q${{ inputs.quarter }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up PATH
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/usr/local/bin"    >> $GITHUB_PATH

      - name: Install Python dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip3 install -q requests playwright yt-dlp
          python3 -m playwright install chromium --with-deps 2>/dev/null || \
          python3 -m playwright install chromium

      - name: Run ingest.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PUSH_FLAG=${{ inputs.push == true && '--push' || '' }}
          python3 ingest.py \
            "${{ inputs.stock_id }}" \
            "${{ inputs.year }}" \
            "${{ inputs.quarter }}" \
            $PUSH_FLAG

      - name: Collect outputs
        id: collect
        run: |
          set -euo pipefail
          shopt -s nullglob

          ASSET_DIR="artifacts/${STEM}"
          mkdir -p "$ASSET_DIR"

          audio_found=0
          for candidate in \
            "tmp/${STEM}.m4a" \
            "tmp/${STEM}.mp3" \
            "${{ inputs.stock_id }}/${STEM}.m4a" \
            "${{ inputs.stock_id }}/${STEM}.mp3"
          do
            if [ -f "$candidate" ]; then
              cp "$candidate" "$ASSET_DIR/"
              echo "Collected audio: $candidate"
              audio_found=1
            fi
          done

          pdf_found=0
          for candidate in "tmp/${STEM}"_*.pdf "${{ inputs.stock_id }}/${STEM}"_*.pdf
          do
            if [ -f "$candidate" ]; then
              cp "$candidate" "$ASSET_DIR/"
              echo "Collected PDF: $candidate"
              pdf_found=1
            fi
          done

          if [ "$audio_found" -ne 1 ]; then
            echo "✗ Audio output not found in tmp/ or ${{ inputs.stock_id }}/" >&2
            exit 1
          fi

          if [ "$pdf_found" -ne 1 ]; then
            echo "✗ PDF output not found in tmp/ or ${{ inputs.stock_id }}/" >&2
            exit 1
          fi

          echo "asset_dir=$ASSET_DIR" >> "$GITHUB_OUTPUT"

      - name: Verify outputs
        run: |
          set -euo pipefail
          echo "✓ Collected assets:"
          ls -lh "${{ steps.collect.outputs.asset_dir }}"

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STEM }}
          path: ${{ steps.collect.outputs.asset_dir }}
